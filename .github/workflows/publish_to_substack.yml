name: Publish Draft to Substack

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish immediately (otherwise creates draft only)"
        required: false
        type: boolean
        default: false
      send_email:
        description: "Send email to subscribers (only applies when publishing)"
        required: false
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Cloudflare WARP (bypass bot protection)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          sudo systemctl start warp-svc
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          sleep 5
          curl -s https://www.cloudflare.com/cdn-cgi/trace/ | grep warp || echo "WARP verification inconclusive — continuing anyway"

      - name: Install dependencies
        run: npm ci

      - name: Push draft to Substack
        env:
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
        run: |
          FLAGS=""
          if [ "${{ inputs.publish }}" = "true" ]; then
            FLAGS="--publish"
            if [ "${{ inputs.send_email }}" = "false" ]; then
              FLAGS="$FLAGS --no-email"
            fi
          fi
          npx tsx scripts/publish_to_substack.ts $FLAGS
