name: Publish Draft to Substack

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish immediately (otherwise creates draft only)"
        required: false
        type: boolean
        default: false
      send_email:
        description: "Send email to subscribers (only applies when publishing)"
        required: false
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Push draft to Substack
        env:
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
        run: |
          FLAGS=""
          if [ "${{ inputs.publish }}" = "true" ]; then
            FLAGS="--publish"
            if [ "${{ inputs.send_email }}" = "false" ]; then
              FLAGS="$FLAGS --no-email"
            fi
          fi
          npx tsx scripts/publish_to_substack.ts $FLAGS
